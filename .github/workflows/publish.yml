name: Publish to npm

on:
  release:
    types: [published]

  # Also allow manual trigger with a custom version bump
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options: [patch, minor, major]

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. Quality gate — run on every publish attempt
  # ─────────────────────────────────────────────────────────────────────────
  quality:
    name: Typecheck, Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────
  # 2. Publish to npm
  # ─────────────────────────────────────────────────────────────────────────
  publish-npm:
    name: Publish to npm
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the version bump commit
      id-token: write   # needed for npm provenance

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      # On manual dispatch: bump version, commit, tag
      - name: Bump version (manual dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version ${{ inputs.bump }} -m "chore: release v%s"
          git push --follow-tags

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────
  # 3. Create GitHub Release (manual dispatch only — releases trigger this
  #    workflow, so only bump-triggered publishes need a release created)
  # ─────────────────────────────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: publish-npm
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get new version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log "$PREV_TAG"..HEAD --pretty=format:"- %s" --no-merges)
          else
            LOG=$(git log --pretty=format:"- %s" --no-merges)
          fi
          echo "log<<EOF" >> "$GITHUB_OUTPUT"
          echo "$LOG"    >> "$GITHUB_OUTPUT"
          echo "EOF"     >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            ## Changes
            ${{ steps.changelog.outputs.log }}

            **Full diff:** https://github.com/${{ github.repository }}/compare/${{ steps.version.outputs.version }}...v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
